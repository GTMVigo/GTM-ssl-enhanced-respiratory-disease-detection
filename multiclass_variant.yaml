run:
    extract_train_test:     True
    evaluate_model:         False

model_extract_train_test:
    condition_path:              /home/projects/avera/medper/uvigo_voice/data/dicoperia/condition_dicoperia.csv      # File containing the patients labels
    condition_id_column:         0                       # Column containing the identifier of the audio or group
    condition_label_column:      3                       # Column containing the label
    wav_folder:                  /home/temporal2/avera/coperia_raw/train      # Folder containing the audio files
    transcript_folder:           /home/projects/avera/medper/uvigo_voice/data/dicoperia/training_transcripts # Folder containing the transcript files
    global_transcript_file: /home/projects/avera/medper/uvigo_voice/data/dicoperia/after_cough.csv
    filter_dataset:              None                    # Filter the dataset by filepath
    model_folder:                /home/temporal2/avera/coperia_raw/models      # Folder to save the models
    log_file:                    ./log.log   # Log file
    save_metrics_path: ./metrics_moe/cough/after_cough/AC_LR_hubert.csv
    num_cores:                   None                    # Number of cores to use, None for all
    train_each_feat_combination: False                   # Train the model for each feature combination
    load_extracted_features:     True                    # Load the extracted features
    path_extracted_features:     /home/projects/avera/medper/uvigo_voice/dicoperia_features/  # Folder to save and load the extracted features
    which_features:                                      # The options are aggregated, raw, frame, aggre_raw, aggre_frame
        - aggregated
        # - raw
        # - frame
        # - aggre_raw
        # - aggre_frame  
    train_model:                 True                    # Train the model
    normalize:                   True                    # Normalize the features
    use_acoustic_feat: False
    use_paralinguistic_feat:     False                    # Train the model for paralinguistic features
    use_linguistic_feat:         False                    # Train the model for linguistic features
    use_lasso_selection:         False                   # Use LASSO-selected features only (requires running lasso_feature_selection.py first)
    use_ssl_hubert: True
    use_ssl_wavlm: False
    use_ssl_wav2vec: False
    kfold_splits:                5                       # Number of splits for the kfold cross validation
    use_val_csv_no_kfold:        False                   # If True, use the csv file for validation instead of kfold
    validation_csv_path:          ./data/Med_acc_ad/condition_MedPer_train_gold_calib_val_4.csv  # Path to the validation csv file
    batch_size:                  64                      # Batch size for the training in batch mode
    dataloader_workers:          0                       # Number of workers for the dataloader for training in batch mode
    epochs:                      10                      # Number of epochs for the training in batch mode
    model_list:
    - LogisticRegression




        # - LogisticRegression
        # - LinearSVM
        # - NaiveBayes
        # - XGBoost
        # - RandomForest
        # - GaussianMixture
        # - SGDOneClassSVM
        # - IsolationForest
        # - MLP                                            # Only works with binary_classification_batch
        # - CNN                                            # Only works with binary_classification_batch
    save_model_f1_threshold:     0.5                    # Threshold to use for saving the model
    detailed_metrics:            True                   # Save the detailed metrics
    optimization_metric:         f1_score                # Metric to use for the optimization of the threshold


model_evaluate:
    model:                      RandomForest                  # The model to evaluate
    model_name:                 aggregated_paralinguistic_RandomForest_0.pkl    # Name of the model
    model_path:                 ./Med_train_models            # Path to the model
    condition_path:             ./data/Med_acc_ad/condition_Accexible.csv  # File containing the patients labels
    condition_id_column:        0                             # Column containing the identifier of the audio or group
    condition_label_column:     3                             # Column containing the label
    wav_folder:                 ./data/Med_acc_ad/audios      # Folder containing the audio files
    transcript_folder:          ./data/Med_acc_ad/transcripts # Folder containing the transcript files
    global_transcript_file: /home/projects/avera/medper/uvigo_voice/data/dicoperia/after_cough.csv
    filter_dataset:              None                         # Filter the dataset by filepath
    log_file:                   ./Acc_2_Ad.log                # Log file
    save_metrics_path: ./metrics_moe/cough/after_cough/AC_LR_hubert.csv
    num_cores:                  None                          # Number of cores to use, None for all
    load_extracted_features:    True                          # Load the extracted features
    path_extracted_features:    ./Med_acc_ad_features/        # Folder to save and load the extracted features
    which_features:                                           # The options are aggregated, raw, frame, aggre_raw, aggre_frame

    use_acoustic_feat: False
    use_paralinguistic_feat:    True                          # Evaluate the model for paralinguistic features
    use_linguistic_feat:        False                         # Evaluate the model for linguistic features
    use_lasso_selection:        False                         # Use LASSO-selected features only (must match training configuration)

    batch_size:                 64                            # Batch size for the evaluation in batch mode
    dataloader_workers:         0                             # Number of workers for the dataloader for evaluation in batch mode
    predictions_threshold:      0.75                          # Threshold to use for succesful predictions
    detailed_metrics:           False                         # Save the detailed metrics

audioprocessor_data:    # Should be modified according to evaluate or extract_train_test
    feature_type: 
        - compare_2016_energy
        - compare_2016_voicing
        - compare_2016_rasta
        - compare_2016_basic_spectral
        - spafe_mfcc
        # - spafe_cqcc
        # - spafe_gfcc
        # - spafe_lfcc
        # - spafe_plp
    resampling_rate:                  16000
    top_db:                           30.0
    pre_emphasis_coefficient:         0.97
    f_min:                            0
    f_max:                            8000
    window_size:                      25
    hop_length:                       10
    n_mels:                           40
    n_mfcc:                           13
    plp_order:                        12
    conversion_approach:              lpcc
    normalize:                        True
    use_energy:                       True
    apply_mean_norm:                  True
    apply_vari_norm:                  True
    compute_deltas_feats:             True
    compute_deltas_deltas_feats:      True
    compute_opensmile_extra_features: False
